<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GoudAI Chat — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- Refonte P1.5 : tout le CSS de la page de connexion est dans css/style.css
       sous le bloc 'Page de connexion (index.html)', namespace .login-page -->
  <link rel="stylesheet" href="css/style.css?v=18">
  <style>html, body { height: 100%; }</style>
</head>
<body class="login-page">

  <div class="card">
    <!-- R1 rebrand : monogramme G geometrique a la place du fromage -->
    <div class="logo"><svg class="goud-mark" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true" style="vertical-align:middle;margin-right:10px"><rect x="3" y="3" width="26" height="26" rx="7" fill="currentColor"/><path d="M21 12h-5a4 4 0 0 0-4 4v0a4 4 0 0 0 4 4h2v-3h-2v-2h5v5a4 4 0 0 1-4 4h-1a7 7 0 0 1-7-7v0a7 7 0 0 1 7-7h5z" fill="var(--bg)"/></svg>goudai</div>
    <div class="tagline">Multi-AI chat · 8 providers · 1 interface</div>

    <!-- URL error (google failed etc) -->
    <div class="url-error" id="url-error"></div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Inscription</button>
    </div>

    <!-- LOGIN FORM -->
    <form class="form" id="form-login" onsubmit="handleLogin(event)">
      <div class="alert" id="login-alert"></div>
      <div>
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="vous@exemple.fr" autocomplete="email" required>
      </div>
      <div>
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="submit-btn" id="login-btn">Connexion</button>
      <div class="divider">OU</div>
      <a class="google-btn" href="/auth/google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Se connecter avec Google
      </a>
    </form>

    <!-- REGISTER FORM -->
    <form class="form hidden" id="form-register" onsubmit="handleRegister(event)">
      <div class="alert" id="register-alert"></div>
      <div>
        <label for="reg-username">Nom d'utilisateur</label>
        <input type="text" id="reg-username" placeholder="VotreNom" autocomplete="username" required minlength="2">
      </div>
      <div>
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="vous@exemple.fr" autocomplete="email" required>
      </div>
      <div>
        <label for="reg-password">Mot de passe</label>
        <input type="password" id="reg-password" placeholder="8 caractères minimum" autocomplete="new-password" required minlength="8">
      </div>
      <button type="submit" class="submit-btn" id="register-btn">Créer mon compte</button>
      <div class="divider">OU</div>
      <a class="google-btn" href="/auth/google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        S'inscrire avec Google
      </a>
    </form>
  </div>

  <script>
    // Check URL params
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'google_denied') {
      document.getElementById('url-error').textContent = 'Connexion Google annulée.';
      document.getElementById('url-error').style.display = 'block';
    } else if (params.get('error') === 'google_failed') {
      document.getElementById('url-error').textContent = 'Erreur lors de la connexion Google. Réessayez.';
      document.getElementById('url-error').style.display = 'block';
    }

    function switchTab(tab) {
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    function showAlert(id, msg, type = 'error') {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'alert ' + type;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spin"></span> Connexion…';
      showAlert('login-alert', '', '');

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            email:    document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          showAlert('login-alert', data.error || 'Erreur de connexion');
          btn.disabled = false;
          btn.textContent = 'Connexion';
        } else {
          showAlert('login-alert', 'Connexion réussie !', 'success');
          setTimeout(() => window.location.href = '/app', 600);
        }
      } catch {
        showAlert('login-alert', 'Impossible de contacter le serveur');
        btn.disabled = false;
        btn.textContent = 'Connexion';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spin"></span> Création…';
      showAlert('register-alert', '', '');

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            email:    document.getElementById('reg-email').value,
            username: document.getElementById('reg-username').value,
            password: document.getElementById('reg-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          showAlert('register-alert', data.error || 'Erreur lors de l\'inscription');
          btn.disabled = false;
          btn.textContent = 'Créer mon compte';
        } else {
          showAlert('register-alert', 'Compte créé ! Redirection…', 'success');
          setTimeout(() => window.location.href = '/app', 800);
        }
      } catch {
        showAlert('register-alert', 'Impossible de contacter le serveur');
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
      }
    }
  </script>



<script>
(function() {
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var isStandalone = window.navigator.standalone === true;
    if (!isIOS || isStandalone) return;
    if (localStorage.getItem("pwa-ios-shown")) return;
    setTimeout(function() {
        var d = document.createElement("div");
        d.style.cssText = "position:fixed;bottom:20px;left:12px;right:12px;background:#1a1724;border:1px solid #c9a84c;border-radius:12px;padding:14px;z-index:99999;color:#e0d0b0;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,0.6);display:flex;align-items:center;gap:10px";
        var closeBtn = document.createElement("button");
        closeBtn.textContent = "×";
        closeBtn.style.cssText = "background:none;border:none;color:#c9a84c;font-size:22px;cursor:pointer;line-height:1";
        closeBtn.onclick = function() { d.remove(); localStorage.setItem("pwa-ios-shown", "1"); };
        var icon = document.createElement("span");
        icon.textContent = "📱";
        icon.style.fontSize = "22px";
        var text = document.createElement("span");
        text.style.flex = "1";
        text.innerHTML = "Installez GoudAI : appuyez sur <b>Partager</b> puis <b>Sur l'écran d'accueil</b>";
        d.appendChild(icon);
        d.appendChild(text);
        d.appendChild(closeBtn);
        document.body.appendChild(d);
    }, 1000);
})();
</script>

</body>
</html>
