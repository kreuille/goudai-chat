# /etc/nginx/sites-available/goudai
# Remplace goudai.tondomaine.fr par ton vrai domaine

server {
    listen 80;
    server_name goudai.tondomaine.fr;
    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name goudai.tondomaine.fr;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/goudai.tondomaine.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goudai.tondomaine.fr/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Sécurité headers ─────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy  "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/goudai.access.log;
    error_log  /var/log/nginx/goudai.error.log;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_vary on;

    # ── Frontend statique ─────────────────────────────────────────
    root /var/www/goudai/frontend;
    index index.html;

    # Page principale (login)
    location = / {
        try_files /index.html =404;
    }

    # App (protégée côté client par auth.js)
    location = /app {
        try_files /app.html =404;
    }

    # Assets statiques avec cache long
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker : pas de cache
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.json {
        expires 1h;
    }

    # ── API Backend → proxy vers Node.js ─────────────────────────
    location /auth/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        # Upload max 10MB
        client_max_body_size 10m;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # ── Fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
